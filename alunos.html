<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Sentinela Acadêmica | Alunos</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="alunos.css">

</head>

<body>

<div class="dashboard">

    <aside class="sidebar" id="sidebar"></aside>

    <main class="content">

        <header class="top-bar">

            <div>
                <h1>Alunos</h1>
                <p>Gerenciamento e acompanhamento dos estudantes.</p>
            </div>

            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="pesquisa" placeholder="Pesquisar por nome ou turma...">
            </div>

        </header>

        <div class="filters" id="filtros">
            <button class="filter active" data-filtro="todos">Todos</button>
            <button class="filter" data-filtro="verde">Estáveis</button>
            <button class="filter" data-filtro="amarelo">Atenção</button>
            <button class="filter" data-filtro="vermelho">Alto Risco</button>
            <button class="filter" data-filtro="informatica">Informática</button>
        </div>

        <div class="table-card">

            <table>

                <thead>

                    <tr>
                        <th>Aluno</th>
                        <th>Turma</th>
                        <th>Média</th>
                        <th>Frequência</th>
                        <th>IPA</th>
                        <th></th>
                    </tr>

                </thead>

                <tbody id="tabelaAlunos"></tbody>

            </table>

            <p class="sem-resultado" id="semResultado" style="display:none;">
                Nenhum aluno encontrado.
            </p>

        </div>

    </main>

</div>

<script src="dados.js"></script>
<script src="app.js"></script>
<script src="alunos.js"></script>

</body>

</html>
