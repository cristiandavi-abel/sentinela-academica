<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Sentinela Acadêmica | Perfil</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="alunos.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="dashboard">

    <aside class="sidebar" id="sidebar"></aside>

    <main class="content">

        <header class="top-bar">
            <div>
                <h1>Perfil do Aluno</h1>
                <p id="subPerfil">Detalhes do estudante.</p>
            </div>
            <a href="alunos.html" class="btn-voltar" id="btnVoltar"><i class="fa-solid fa-arrow-left"></i> Voltar</a>
        </header>

        <div class="perfil-card" id="perfilCard"></div>

        <section class="chart-card" style="margin-top:20px;">
            <h2>Evolução do IPA</h2>
            <canvas id="graficoPerfil" height="120"></canvas>
        </section>

        <section class="table-card" style="margin-top:20px;">
            <h2 style="padding:22px 22px 0;">Boletim</h2>
            <table>
                <thead>
                    <tr><th>Disciplina</th><th>Nota</th><th>Desempenho</th></tr>
                </thead>
                <tbody id="tabelaPerfil"></tbody>
            </table>
        </section>

    </main>

</div>

<script src="dados.js"></script>
<script src="app.js"></script>
<script src="perfil.js"></script>

</body>

</html>
