<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Sentinela Acadêmica | Alertas</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="alunos.css">

</head>

<body>

<div class="dashboard">

    <aside class="sidebar" id="sidebar"></aside>

    <main class="content">

        <header class="top-bar">
            <div>
                <h1>Alertas Preventivos</h1>
                <p>Estudantes que exigem atenção da coordenação.</p>
            </div>
        </header>

        <div class="table-card">

            <table>

                <thead>
                    <tr>
                        <th>Aluno</th>
                        <th>Turma</th>
                        <th>IPA</th>
                        <th>Status</th>
                        <th></th>
                    </tr>
                </thead>

                <tbody id="tabelaAlertas"></tbody>

            </table>

            <p class="sem-resultado" id="semAlertas" style="display:none;">
                Nenhum aluno em situação de alerta. 🎉
            </p>

        </div>

    </main>

</div>

<script src="dados.js"></script>
<script src="app.js"></script>
<script src="alertas.js"></script>

</body>

</html>
