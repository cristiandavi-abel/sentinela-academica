<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Sentinela Acadêmica | Visão Geral</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="dashboard.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="dashboard">

    <!-- Sidebar -->

    <aside class="sidebar" id="sidebar"></aside>

    <!-- Conteúdo -->

    <main class="content">

        <header class="top-bar">

            <div>
                <h1>Visão Geral</h1>
                <p>Bem-vinda, Coordenação Pedagógica.</p>
            </div>

            <div class="avatar-coord"><i class="fa-solid fa-user-shield"></i></div>

        </header>

        <!-- Cards -->

        <section class="cards" id="cardsResumo"></section>

        <!-- Conteúdo inferior -->

        <section class="dashboard-grid">

            <div class="chart-card">

                <h2>Evolução dos Indicadores</h2>
                <canvas id="grafico"></canvas>

            </div>

            <div class="alert-card">

                <h2>Alunos em Atenção</h2>
                <ul id="listaAtencao"></ul>

            </div>

        </section>

    </main>

</div>

<script src="dados.js"></script>
<script src="app.js"></script>
<script src="dashboard.js"></script>

</body>

</html>
