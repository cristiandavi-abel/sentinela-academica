<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Sentinela Acadêmica | Relatórios</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="dashboard.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="dashboard">

    <aside class="sidebar" id="sidebar"></aside>

    <main class="content">

        <header class="top-bar">
            <div>
                <h1>Relatórios</h1>
                <p>Indicadores gerais do período letivo.</p>
            </div>
        </header>

        <section class="cards" id="cardsRelatorio"></section>

        <section class="dashboard-grid">

            <div class="chart-card">
                <h2>Distribuição por Situação</h2>
                <canvas id="graficoDistribuicao"></canvas>
            </div>

            <div class="chart-card">
                <h2>IPA Médio por Turma</h2>
                <canvas id="graficoTurmas"></canvas>
            </div>

        </section>

        <section class="chart-card" style="margin-top:20px;">
            <h2>Desempenho por Disciplina</h2>
            <canvas id="graficoDisciplinas" height="120"></canvas>
        </section>

    </main>

</div>

<script src="dados.js"></script>
<script src="app.js"></script>
<script src="relatorios.js"></script>

</body>

</html>
